    <circle cx="31" cy="12" r="8" fill="#FFE8A0"/>
  </g>
  <g transform="translate(309 234)">
    <rect width="44" height="24" rx="12" fill="#C14E32"/>
    <circle cx="31" cy="12" r="8" fill="#FFE8A0"/>
  </g>
  <line x1="210" y1="298" x2="344" y2="298" stroke="#6E674B" stroke-width="5" stroke-linecap="round"/>
  <line x1="210" y1="298" x2="300" y2="298" stroke="#F0C665" stroke-width="5" stroke-linecap="round"/>
  <circle cx="300" cy="298" r="9" fill="#FFE8A0"/>
  <text x="354" y="303" text-anchor="end" class="value">70%</text>
  <g transform="translate(309 334)">
    <rect width="44" height="24" rx="12" fill="#C14E32"/>
    <circle cx="31" cy="12" r="8" fill="#FFE8A0"/>
  </g>

  <text x="72" y="440" class="section">棋盘设置</text>
  <line x1="72" y1="459" x2="358" y2="459" stroke="#6E674B" stroke-width="1"/>
  <text x="82" y="500" class="row">走棋提示开关</text>
  <text x="82" y="552" class="row">可走位置提示开关</text>
  <text x="82" y="604" class="row">将军提示开关</text>

  <g transform="translate(309 481)">
    <rect width="44" height="24" rx="12" fill="#C14E32"/>
    <circle cx="31" cy="12" r="8" fill="#FFE8A0"/>
  </g>
  <g transform="translate(309 533)">
    <rect width="44" height="24" rx="12" fill="#C14E32"/>
    <circle cx="31" cy="12" r="8" fill="#FFE8A0"/>
  </g>
  <g transform="translate(309 585)">
    <rect width="44" height="24" rx="12" fill="#C14E32"/>
    <circle cx="31" cy="12" r="8" fill="#FFE8A0"/>
  </g>

  <rect x="72" y="654" width="286" height="62" rx="13" fill="#1B281F" stroke="#6E674B" stroke-width="1.2" opacity=".9"/>
  <text x="215" y="685" text-anchor="middle" class="desc">只保留当前标记的设置项</text>
  <text x="215" y="707" text-anchor="middle" class="value">后续功能再按你发的图继续加</text>
</svg>
